<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="化けた文字列やバイト列から、どのエンコーディングの誤読が原因かを逆引きして元の文章を復元するブラウザ内解析器。"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f5f1e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15140f" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="mojibake — 文字化け逆引き解析器" />
    <meta
      property="og:description"
      content="化けた文字列を貼ると、何を何として誤読したかを総当たりで突き止め、元の文章を復元する。"
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>mojibake — 文字化け逆引き解析器</title>
    <script>
      // 描画前にテーマを確定させ、初回のちらつきを防ぐ
      (function () {
        try {
          var saved = localStorage.getItem('mojibake-theme');
          if (saved === 'light' || saved === 'dark') {
            document.documentElement.dataset.theme = saved;
          }
        } catch (e) {
          /* localStorageが使えない環境では既定(OS設定)に従う */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <noscript>mojibakeはブラウザ内で解析するためJavaScriptが必要です。</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
