<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" role="img" aria-label="mojibakeのアーキテクチャ図" color="#768390">
  <title>mojibakeのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #e8b04b; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: currentColor; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: currentColor; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #e8b04b; }
    .arrow { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="currentColor"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="170" height="80" rx="8" class="box"/>
  <text x="40" y="48" class="label">化けた文字列</text>
  <text x="40" y="72" class="small">縺薙ｓ縺ｫ... など</text>

  <rect x="20" y="130" width="170" height="80" rx="8" class="box"/>
  <text x="40" y="158" class="label">バイト列</text>
  <text x="40" y="182" class="small">16進 / % / Base64</text>

  <rect x="250" y="20" width="250" height="80" rx="8" class="accent-box"/>
  <text x="270" y="48" class="accent-label">逆引き(encodings)</text>
  <text x="270" y="72" class="small">誤読エンコーディングで再エンコード</text>
  <text x="270" y="90" class="small">逆引き表はTextDecoderから構築</text>

  <rect x="250" y="130" width="250" height="80" rx="8" class="box"/>
  <text x="270" y="158" class="label">総当たり復号(analyze)</text>
  <text x="270" y="182" class="small">全候補エンコーディングでdecode</text>

  <rect x="560" y="75" width="150" height="90" rx="8" class="box"/>
  <text x="580" y="103" class="label">採点</text>
  <text x="580" y="127" class="small">かな・漢字の比率</text>
  <text x="580" y="145" class="small">復号失敗の減点</text>

  <rect x="760" y="75" width="80" height="90" rx="8" class="box"/>
  <text x="778" y="103" class="label">候補</text>
  <text x="778" y="127" class="small">原因と</text>
  <text x="778" y="145" class="small">復元文</text>

  <path class="arrow" d="M190 60 H242"/>
  <path class="arrow" d="M190 170 H242"/>
  <path class="arrow" d="M500 60 H530 V100 H552"/>
  <path class="arrow" d="M500 170 H530 V140 H552"/>
  <path class="arrow" d="M710 120 H752"/>
</svg>
